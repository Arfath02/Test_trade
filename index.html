<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Signal Analyzer — TradeVision AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #050816;
            color: #ffffff;
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            background: linear-gradient(135deg, #00ffb3, #00c2ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #000;
            font-weight: bold;
        }

        .logo h1 {
            font-size: 20px;
            letter-spacing: 2px;
        }

        .logo span {
            font-size: 12px;
            color: #7d8ca3;
        }

        .vision {
            color: #7d8ca3;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: #0b1020;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
        }

        .card-title {
            font-size: 12px;
            color: #7d8ca3;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .timeframes {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .tf-btn {
            padding: 10px;
            background: #11182c;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
        }

        .tf-btn:hover,
        .tf-btn.active {
            background: #00d084;
            color: #000;
            font-weight: bold;
        }

        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .badge {
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .red {
            background: #3b0b14;
            color: #ff4d6d;
        }

        .orange {
            background: #3a2405;
            color: #ffb347;
        }

        .green {
            background: #063b2c;
            color: #00ffb3;
        }

        .blue {
            background: #071f4d;
            color: #4da3ff;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #7d8ca3;
            font-size: 14px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 14px;
            background: #11182c;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: white;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #00ffb3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table th,
        table td {
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px;
            text-align: center;
            font-size: 14px;
        }

        table th {
            background: #11182c;
            color: #7d8ca3;
        }

        .bottom-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .live-chart {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 250px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
        }

        .chart-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .analyze-btn {
            width: 100%;
            min-height: 150px;
            background: #00b67a;
            border: none;
            border-radius: 18px;
            color: #00150f;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .analyze-btn:hover:not(:disabled) {
            background: #00ffb3;
            transform: scale(1.02);
        }

        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top-color: #00150f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media(max-width: 992px) {

            .grid,
            .bottom-grid {
                grid-template-columns: 1fr;
            }

            .timeframes {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">
                <div class="logo-box">↗</div>
                <div>
                    <h1>TRADING AI</h1>
                    <span>SIGNAL ANALYZER v2.0</span>
                </div>
            </div>
            <div class="vision">⚡TESTING VISION </div>
        </div>

        <div class="grid">
            <!-- TIMEFRAME -->
            <div class="card">
                <div class="card-title">Timeframe</div>
                <div class="timeframes">
                    <button class="tf-btn" data-tf="M1">M1</button>
                    <button class="tf-btn" data-tf="M5">M5</button>
                    <button class="tf-btn" data-tf="M15">M15</button>
                    <button class="tf-btn" data-tf="M30">M30</button>
                    <button class="tf-btn" data-tf="H1">H1</button>
                    <button class="tf-btn" data-tf="H4">H4</button>
                    <button class="tf-btn active" data-tf="D1">D1</button>
                    <button class="tf-btn" data-tf="W1">W1</button>
                    <button class="tf-btn" data-tf="MN">MN</button>
                </div>
                <div class="badge-group">
                    <div class="badge red">M1-M15 scalp</div>
                    <div class="badge orange">M30-H1 intraday</div>
                    <div class="badge green">H4-D1 swing</div>
                    <div class="badge blue">W1-MN position</div>
                </div>
            </div>

            <!-- SESSION -->
            <div class="card">
                <div class="card-title">Session & Instrument</div>
                <div class="input-group">
                    <label>API Key</label>
                    <input type="password" id="apiKey" value="AIzaSyBeTxQ9f41nwp0nyhAvqEiXYhCYgeL5l-I" />
                </div>
                <div class="input-group">
                    <label>Instrument</label>
                    <input type="text" id="instrument" value="XAUUSD" placeholder="e.g. BTCUSD" />
                </div>
                <div class="input-group">
                    <label>Trading Session</label>
                    <select id="session">
                        <option>Asian</option>
                        <option>London</option>
                        <option>New York</option>
                    </select>
                </div>
            </div>

            <!-- LOT SIZE -->
            <div class="card">
                <div class="card-title">Lot Size & Pips</div>
                <div class="input-group">
                    <label>Lot Size</label>
                    <select id="lotSize">
                        <option value="0.01">0.01 (Micro)</option>
                        <option value="0.10">0.10 (Mini)</option>
                        <option value="1">1 (Standard)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Pips per point</label>
                    <input type="number" id="pipsPerPoint" value="10" />
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Lot Size</th>
                            <th>Point Value (USD)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>0.01 (Micro)</td>
                            <td>0.10</td>
                        </tr>
                        <tr>
                            <td>0.10 (Mini)</td>
                            <td>1</td>
                        </tr>
                        <tr>
                            <td>1 (Standard)</td>
                            <td>10</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bottom-grid">
            <!-- FOREX SESSION -->
            <div class="card">
                <div class="card-title">Forex Sessions</div>
                <div class="input-group">
                    <label>Select Session</label>
                    <select id="forexSession">
                        <option>Sydney (03:30 AM - 12:30 PM)</option>
                        <option>Tokyo (05:30 AM - 02:30 PM)</option>
                        <option>London (01:30 PM - 10:30 PM)</option>
                        <option>New York (06:30 PM - 03:30 AM)</option>
                    </select>
                </div>
            </div>

            <!-- LIVE CHART -->
            <div class="card live-chart">
                <div class="chart-icon">📊</div>
                <h3>Upload Trading Chart</h3>
                <p style="color:#7d8ca3; margin-top:10px; text-align:center; margin-bottom:20px;">Upload screenshot to
                    analyze</p>
                <input type="file" id="chartUpload" accept="image/*"
                    style="width:100%; padding:12px; background:#11182c; border-radius:10px; border:1px solid rgba(255,255,255,0.08); color:white; cursor:pointer;" />
                <img id="previewImage"
                    style="width:100%; margin-top:20px; border-radius:12px; display:none; max-height:260px; object-fit:cover; border:1px solid rgba(255,255,255,0.08);" />
            </div>

            <!-- ANALYZE -->
            <button class="analyze-btn" id="analyzeBtn">★ ANALYZE CHARTS</button>
        </div>
    </div>

    <script>
        const tfButtons = document.querySelectorAll('.tf-btn');
        tfButtons.forEach(btn => btn.addEventListener('click', () => {
            tfButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }));

        const chartUpload = document.getElementById('chartUpload');
        const previewImage = document.getElementById('previewImage');
        let base64Image = null;
        let mimeType = 'image/jpeg';

        chartUpload.addEventListener('change', () => {
            const file = chartUpload.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    previewImage.src = e.target.result;
                    previewImage.style.display = 'block';
                    base64Image = e.target.result.split(',')[1];
                    mimeType = e.target.result.split(';')[0].split(':')[1];
                };
                reader.readAsDataURL(file);
            }
        });

        const analyzeBtn = document.getElementById('analyzeBtn');

        analyzeBtn.addEventListener('click', async () => {
            if (!base64Image) return alert('Please upload a trading chart image');

            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) return alert('Please enter an API Key');

            analyzeBtn.innerHTML = '<div class="spinner"></div> ANALYZING...';
            analyzeBtn.disabled = true;

            const activeTF = document.querySelector('.tf-btn.active');
            const timeframe = activeTF ? activeTF.dataset.tf : 'D1';
            const instrument = document.getElementById('instrument').value;
            const session = document.getElementById('session').value;
            const forexSession = document.getElementById('forexSession').value;

            const prompt = `You are a professional trading analyst. Analyze this chart for ${instrument} on the ${timeframe} timeframe.
Current session: ${session}. Forex session: ${forexSession}.
Provide a precise trading signal in JSON format:
{
  "signal": "BUY", "SELL", "HOLD", or "WAIT",
  "confidence": 0-100,
  "entry_price": "exact price level",
  "stop_loss": "exact SL level",
  "market_sentiment": "Bullish/Bearish/Neutral",
  "analysis": "1-2 sentences of technical reasoning"
}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: mimeType, data: base64Image } }] }],
                        generationConfig: { response_mime_type: 'application/json' }
                    })
                });

                const text = await response.text();
                if (!response.ok) {
                    let err;
                    try { err = JSON.parse(text); } catch(e) { throw new Error(`HTTP ${response.status}: ${text || 'Unknown Error'}`); }
                    throw new Error(err.error?.message || `API Error ${response.status}`);
                }

                if (!text) throw new Error('Empty response from API');
                
                const data = JSON.parse(text);
                if (!data.candidates || !data.candidates[0]) {
                    throw new Error('No analysis generated. Try a different image.');
                }
                
                const resultText = data.candidates[0].content.parts[0].text;
                const result = JSON.parse(resultText);

                alert(`★ ANALYSIS COMPLETE ★\n\nSignal: ${result.signal}\nConfidence: ${result.confidence}%\nEntry: ${result.entry_price}\nStop Loss: ${result.stop_loss}\nSentiment: ${result.market_sentiment}\n\nAnalysis: ${result.analysis}`);

            } catch (error) {
                console.error(error);
                alert('Error: ' + error.message);
            } finally {
                analyzeBtn.innerHTML = '★ ANALYZE CHARTS';
                analyzeBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
